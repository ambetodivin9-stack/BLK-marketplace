<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BLK Marketplace</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F5F0E8; color: #1a1a1a; min-height: 100vh; }
    .kente { height: 6px; background: linear-gradient(90deg, #FFD700 20%, #2ECC71 40%, #E74C3C 60%, #FFD700 80%); position: fixed; top: 0; left: 0; right: 0; z-index: 1000; }
    .auth-page { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 500; background: linear-gradient(135deg, #FFD700, #FF8C00); }
    .auth-page .glass { width: 100%; max-width: 420px; padding: 32px 24px; background: rgba(255,255,255,0.7); backdrop-filter: blur(30px); border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); border: 1px solid rgba(255,255,255,0.5); }
    .auth-page h2 { text-align: center; font-size: 28px; font-weight: 800; color: #1a1a1a; margin-bottom: 8px; }
    .auth-page .subtitle { text-align: center; font-size: 14px; color: rgba(0,0,0,0.5); margin-bottom: 24px; }
    .auth-page input { width: 100%; padding: 14px 16px; border: 1px solid rgba(0,0,0,0.1); border-radius: 14px; background: rgba(255,255,255,0.8); font-size: 15px; margin-bottom: 12px; }
    .auth-page input:focus { outline: none; border-color: #E74C3C; box-shadow: 0 0 0 3px rgba(231,76,60,0.15); background: #fff; }
    .btn { padding: 14px 28px; border: none; border-radius: 14px; font-weight: 700; font-size: 14px; cursor: pointer; width: 100%; text-transform: uppercase; background: #E74C3C; color: #fff; }
    .btn:hover { background: #C0392B; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(231,76,60,0.3); }
    .welcome-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: none; align-items: center; justify-content: center; z-index: 600; background: linear-gradient(135deg, #FFD700, #2ECC71, #E74C3C); padding: 40px; text-align: center; }
    .welcome-screen.active { display: flex; }
    .welcome-screen .logo-big { font-size: 72px; font-weight: 900; color: #fff; text-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    .welcome-screen .logo-big span { color: #1a1a1a; }
    .welcome-screen h1 { font-size: 36px; color: #fff; font-weight: 800; margin-bottom: 8px; }
    .welcome-screen p { font-size: 16px; color: rgba(255,255,255,0.85); max-width: 320px; margin: 0 auto 32px; }
    .welcome-screen .btn { background: #fff; color: #1a1a1a; max-width: 280px; margin: 0 auto; }
    .app-container { max-width: 800px; margin: 0 auto; padding: 70px 16px 100px; display: none; }
    .app-container.active { display: block; }
    .page { display: none; }
    .page.active { display: block; }
    .page-title { font-size: 22px; font-weight: 800; color: #E74C3C; margin-bottom: 16px; }
    header { position: fixed; top: 6px; left: 0; right: 0; z-index: 200; padding: 10px 16px; display: none; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.65); backdrop-filter: blur(30px); border-bottom: 1px solid rgba(255,255,255,0.4); }
    header .logo { font-size: 20px; font-weight: 800; color: #E74C3C; }
    header .user-info { display: flex; align-items: center; gap: 10px; }
    header .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: #E74C3C; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; }
    header .user-name { font-size: 13px; font-weight: 600; }
    .tabs { position: fixed; bottom: 0; left: 0; right: 0; display: none; background: rgba(255,255,255,0.5); backdrop-filter: blur(30px); border-top: 1px solid rgba(255,255,255,0.8); padding: 8px; z-index: 150; }
    .tabs.active { display: flex; }
    .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; border: none; background: none; cursor: pointer; font-size: 9px; font-weight: 600; color: rgba(0,0,0,0.4); padding: 8px 4px; }
    .tab-btn.active { color: #E74C3C; background: rgba(231,76,60,0.1); }
    .glass-lg { background: rgba(255,255,255,0.65); backdrop-filter: blur(30px); border-radius: 24px; padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); border: 1px solid rgba(255,255,255,0.4); margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .product-card { background: rgba(255,255,255,0.65); backdrop-filter: blur(20px); border-radius: 14px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255,255,255,0.4); }
    .product-card .img { width: 100%; height: 150px; object-fit: cover; background: #e8e0d8; }
    .product-card .info { padding: 12px; }
    .product-card .title { font-size: 13px; font-weight: 700; }
    .product-card .price { font-size: 15px; font-weight: 800; color: #E74C3C; margin-top: 4px; }
    .product-card .seller { font-size: 11px; color: rgba(0,0,0,0.4); margin-top: 4px; }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: #E74C3C; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800; color: #fff; border: 3px solid #E74C3C; }
    .wallet-balance { font-size: 32px; font-weight: 800; color: #2ECC71; }
  </style>
</head>
<body>
  <div class="kente"></div>

  <!-- PAGE D'AUTH -->
  <div id="authPage" class="auth-page">
    <div class="glass">
      <h2>BLK</h2>
      <p class="subtitle">Bienvenue sur BLK Marketplace</p>
      <input type="text" id="loginName" placeholder="Nom complet" value="Divin Ambeto" />
      <input type="email" id="loginEmail" placeholder="Adresse e-mail" value="ambetodivin9@gmail.com" />
      <button class="btn" id="btnLogin">Se connecter</button>
      <p style="text-align:center; margin-top:16px; font-size:12px; color:rgba(0,0,0,0.3);">En vous inscrivant, vous acceptez nos conditions.</p>
    </div>
  </div>

  <!-- ECRAN DE BIENVENUE -->
  <div class="welcome-screen" id="welcomeScreen">
    <div>
      <div class="logo-big">BLK<span>.</span></div>
      <h1>Bienvenue dans<br>l'univers BLK</h1>
      <p>La mode et les accessoires à portée de main.</p>
      <button class="btn" id="welcomeBtn">Découvrir</button>
    </div>
  </div>

  <!-- HEADER -->
  <header id="header">
    <span class="logo">BLK</span>
    <div class="user-info">
      <span class="user-name" id="headerName">Utilisateur</span>
      <div class="user-avatar" id="headerAvatar">U</div>
    </div>
  </header>

  <!-- APP -->
  <div class="app-container" id="appContainer">
    <div id="alertBox" style="padding:12px 16px; border-radius:14px; margin-bottom:16px; display:none; background:rgba(46,204,113,0.1); color:#27AE60; border-left:4px solid #2ECC71;"></div>

<!-- ACCUEIL -->
<div class="page active" id="pageHome">
  <div class="glass-lg">
    <h2>🏠 Accueil</h2>
    <div id="productsGrid" class="grid"></div>
  </div>
</div>

<!-- PROFIL -->
<div class="page" id="pageProfile">
  <h2 class="page-title">👤 Mon Profil</h2>
  <div class="glass-lg" style="text-align:center;">
    <div class="profile-avatar" id="profileAvatar">U</div>
    <h3 id="profileName">Utilisateur</h3>
    <p style="color:rgba(0,0,0,0.4);" id="profileEmail">email@example.com</p>
    <p style="color:rgba(0,0,0,0.4);" id="profilePhone">+242 06 XXX XXXX</p>
    <div style="margin-top:8px;">
      <span>🔥 <span id="profileFlames">0</span> flammes</span>
    </div>
  </div>
  <div class="glass-lg">
    <h3 style="color:#2ECC71;">💰 Wallet BLK</h3>
    <p class="wallet-balance"><span id="walletBalance">0</span> FCFA</p>
    <button class="btn" id="btnDeposit" style="background:#2ECC71; margin-top:8px;">Déposer</button>
  </div>
  <button class="btn" id="btnLogout" style="background:#E74C3C; margin-top:8px;">🚪 Déconnexion</button>
</div>
  </div>

  <!-- TABS -->
  <nav class="tabs" id="tabs">
    <button class="tab-btn active" data-page="pageHome">🏠 Accueil</button>
    <button class="tab-btn" data-page="pageProfile">👤 Profil</button>
  </nav>

  <script>
    // 
    // CONFIGURATION
    // 
    var BACKEND_URL = 'https://blk-marketplace2-0.onrender.com';
    var STORAGE_KEY = 'blk_user_id';
    var currentUser = null;
    var currentUserId = null;

    // 
    // FONCTIONS UTILITAIRES
    // 
    function showAlert(message, type) {
      var box = document.getElementById('alertBox');
      box.textContent = message;
      box.style.display = 'block';
      if (type = 'error') {
        box.style.background = 'rgba(231,76,60,0.1)';
        box.style.color = '#E74C3C';
        box.style.borderLeftColor = '#E74C3C';
      } else {
        box.style.background = 'rgba(46,204,113,0.1)';
        box.style.color = '#27AE60';
        box.style.borderLeftColor = '#2ECC71';
      }
      clearTimeout(box._timeout);
      box._timeout = setTimeout(function() { box.style.display = 'none'; }, 4000);
    }

    // 
    // CONNEXION
    // 
    function handleLogin(name, email) {
      var userId = localStorage.getItem(STORAGE_KEY);
      if (!userId) {
        userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        localStorage.setItem(STORAGE_KEY, userId);
      }
      currentUserId = userId;
      currentUser = {
        name: name || 'Utilisateur',
        email: email || 'user@example.com',
        phone: '+242 06 XXX XXXX',
        flames: 0,
        walletBalance: 0,
        id: userId
      };

      document.getElementById('authPage').style.display = 'none';
      document.getElementById('welcomeScreen').classList.add('active');

      document.getElementById('welcomeBtn').onclick = function() {
        document.getElementById('welcomeScreen').classList.remove('active');
        showMainApp();
        showAlert('✅ Bienvenue ' + currentUser.name + ' !', 'success');
      };
    }

    document.getElementById('btnLogin').addEventListener('click', function() {
      var name = document.getElementById('loginName').value.trim() || 'Utilisateur';
      var email = document.getElementById('loginEmail').value.trim() || 'user@example.com';
      handleLogin(name, email);
    });

    // 
    // AFFICHAGE PRINCIPAL
    // 
    function showMainApp() {
      document.getElementById('appContainer').classList.add('active');
      document.getElementById('header').style.display = 'flex';
      document.getElementById('tabs').classList.add('active');

      document.getElementById('headerName').textContent = currentUser.name;
      document.getElementById('headerAvatar').textContent = currentUser.name.charAt(0).toUpperCase();
      document.getElementById('profileName').textContent = currentUser.name;
      document.getElementById('profileEmail').textContent = currentUser.email;
      document.getElementById('profilePhone').textContent = currentUser.phone;
      document.getElementById('profileFlames').textContent = currentUser.flames || 0;
      document.getElementById('profileAvatar').textContent = currentUser.name.charAt(0).toUpperCase();
      document.getElementById('walletBalance').textContent = currentUser.walletBalance || 0;

      loadProducts();
      loadWallet();
    }

    // 
    // CHARGEMENT DES PRODUITS (simulé)
    // 
    function loadProducts() {
      var grid = document.getElementById('productsGrid');
      var products = [
        { title: 'Robe vintage', price: 15000, seller: 'Marie', image: '' },
        { title: 'Chemise blanche', price: 8000, seller: 'Jean', image: '' },
        { title: 'Sac à main', price: 25000, seller: 'Sophie', image: '' }
      ];
      grid.innerHTML = '';
      products.forEach(function(p) {
        var card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = '<div class="img" style="background:linear-gradient(135deg,#f0ebe3,#e8e0d8);display:flex;align-items:center;justify-content:center;font-size:40px;">👗</div><div class="info"><div class="title">' + p.title + '</div><div class="price">' + p.price + ' FCFA</div><div class="seller">' + p.seller + '</div></div>';
        grid.appendChild(card);
      });
    }

    // 
    // CHARGEMENT DU WALLET
    // 
    function loadWallet() {
      if (!currentUserId) return;
      fetch(BACKEND_URL + '/api/wallet/' + currentUserId)
        .then(function(res) { return res.json(); })
        .then(function(data) {
          document.getElementById('walletBalance').textContent = data.balance || 0;
        })
        .catch(function(e) { console.error(e); });
    }

    // 
    // DÉPÔT
    // 
    document.getElementById('btnDeposit').addEventListener('click', function() {
      var amount = prompt('Entrez le montant à déposer (FCFA) :', '500');
      if (!amount) return;
      var phone = prompt('Entrez votre numéro MTN :', '065918166');
      if (!phone) return;

      fetch(BACKEND_URL + '/api/wallet/deposit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          userId: currentUserId,
          amount: parseInt(amount),
          phone: phone
        })
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.success) {
          showAlert('💰 ' + data.message, 'success');
          loadWallet();
        } else {
          showAlert('❌ ' + data.message, 'error');
        }
      })
      .catch(function(e) {
        showAlert('❌ Erreur : ' + e.message, 'error');
      });
    });

    // 
    // DÉCONNEXION
    // 
    document.getElementById('btnLogout').addEventListener('click', function() {
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    });

    // 
    // TABS
    // 
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
        document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
        this.classList.add('active');
        document.getElementById(this.dataset.page).classList.add('active');
      });
    });

    // 
    // INIT
    // ==
    console.log('✅ BLK Marketplace - Version stable');
    console.log('🔗 Backend URL: ' + BACKEND_URL);
  </script>

</body>
</html>
