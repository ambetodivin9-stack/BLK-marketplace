<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLK Marketplace</title>
    <script src="https://www.gstatic.com/firebaseapp/10.5.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebaseapp/10.5.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebaseapp/10.5.0/firebase-firestore.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

    @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes timerDanger { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #FFF5E6; color: #333; min-height: 100vh; }
    .kente { height: 8px; background: linear-gradient(90deg, #FFA500, #2ECC71, #E74C3C, #FFD700); position: fixed; top: 0; left: 0; right: 0; z-index: 300; }
    
    header { background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,165,0,0.2); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 8px; left: 0; right: 0; z-index: 200; }
    .logo { font-size: 22px; font-weight: 800; color: #FFA500; letter-spacing: 2px; }

    .glass-container { background: rgba(255,255,255,0.6); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.8); border-radius: 24px; padding: 20px; margin-bottom: 12px; transition: all 0.3s; }
    .glass-container:hover { background: rgba(255,255,255,0.75); border-color: rgba(255,165,0,0.3); }

    .page { display: none; animation: slideIn 0.4s ease; }
    .page.active { display: block; }

    .auth-page { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 250; }
    .auth-page.signup { background: linear-gradient(-45deg, #FFA500, #2ECC71, #E74C3C, #FFD700); background-size: 400% 400%; animation: gradientShift 15s ease infinite; }
    .auth-page.login { background: linear-gradient(135deg, rgba(255,245,230,0.95), rgba(255,250,239,0.95)); }

    .auth-box { background: rgba(255,255,255,0.85); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.9); border-radius: 32px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
    .auth-box h2 { text-align: center; margin-bottom: 32px; font-size: 28px; color: #FFA500; }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; font-size: 12px; text-transform: uppercase; }
    input, textarea, select { width: 100%; padding: 14px 16px; border: 1px solid rgba(255,165,0,0.2); border-radius: 14px; background: rgba(255,255,255,0.8); color: #1a1a1a; font-size: 14px; transition: all 0.3s; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #FFA500; background: rgba(255,255,255,1); box-shadow: 0 0 0 3px rgba(255,165,0,0.1); }

    .btn { padding: 14px 28px; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; font-size: 14px; width: 100%; text-transform: uppercase; transition: all 0.3s; }
    .btn-primary { background: rgba(255,165,0,0.2); color: #FFA500; border: 2px solid #FFA500; }
    .btn-primary:hover { background: #FFA500; color: #FFF; transform: translateY(-2px); }
    .btn-success { background: #2ECC71; color: #FFF; border: none; }
    .btn-success:hover { background: #27AE60; transform: translateY(-2px); }
    .btn-danger { background: #E74C3C; color: #FFF; border: none; }
    .btn-danger:hover { background: #C0392B; transform: translateY(-2px); }

    .container { max-width: 800px; margin: 0 auto; padding: 70px 16px 100px; display: none; }
    .container.active { display: block; }

    .tabs { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,165,0,0.15); padding: 8px; gap: 4px; z-index: 150; }
    .tab-btn { flex: 1; padding: 10px 8px; border: none; background: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; color: rgba(0,0,0,0.4); font-size: 10px; font-weight: 600; border-radius: 12px; transition: all 0.2s; }
    .tab-btn:hover { color: #FFA500; background: rgba(255,165,0,0.08); }
    .tab-btn.active { color: #FFA500; background: rgba(255,165,0,0.15); }
    .tab-icon { font-size: 20px; }

    .card { background: rgba(255,255,255,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.8); border-radius: 18px; padding: 16px; margin-bottom: 12px; transition: all 0.3s; }
    .card:hover { background: rgba(255,255,255,0.8); border-color: rgba(255,165,0,0.3); transform: translateY(-2px); }

    h1 { font-size: 28px; margin-bottom: 20px; color: #FFA500; font-weight: 800; }
    h3 { color: #333; margin-bottom: 12px; font-size: 15px; font-weight: 700; }

    .alert { padding: 12px 16px; border-radius: 14px; margin-bottom: 16px; font-size: 13px; display: none; animation: slideIn 0.3s ease; border-left: 4px solid; }
    .alert.active { display: block; }
    .alert-success { background: rgba(46,204,113,0.1); color: #27AE60; border-left-color: #2ECC71; }
    .alert-error { background: rgba(231,76,60,0.1); color: #C0392B; border-left-color: #E74C3C; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .product-card { background: rgba(255,255,255,0.6); backdrop-filter: blur(20px); border-radius: 16px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255,255,255,0.7); transition: all 0.3s; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    .product-img { width: 100%; height: 140px; object-fit: cover; background: linear-gradient(135deg, #FFF5E6, #FFFAEF); }
    .product-info { padding: 12px; }
    .product-title { font-weight: 700; font-size: 13px; color: #333; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .product-price { color: #FFA500; font-weight: 800; font-size: 15px; }

    .timer { font-size: 32px; font-weight: 800; color: #FFA500; text-align: center; margin: 16px 0; font-family: 'Courier New', monospace; }
    .timer.danger { animation: timerDanger 1s infinite; color: #FF6B6B; }

    .empty-state { text-align: center; padding: 40px 20px; color: rgba(0,0,0,0.4); }

    .toggle-form { text-align: center; margin-top: 20px; color: rgba(0,0,0,0.5); font-size: 13px; }
    .toggle-form button { background: none; border: none; color: #FFA500; cursor: pointer; font-weight: 700; text-decoration: underline; }

    .message-item { background: rgba(255,255,255,0.5); padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 3px solid #FFA500; }
    .message-sender { font-weight: 700; font-size: 12px; color: #FFA500; margin-bottom: 4px; }
    .message-text { color: #333; font-size: 13px; }

    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 400; backdrop-filter: blur(5px); }
    .modal-content { background: rgba(255,255,255,0.95); backdrop-filter: blur(30px); border-radius: 28px; padding: 24px; max-width: 400px; width: 90%; max-height: 80vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.9); position: relative; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 28px; color: #666; cursor: pointer; }

    .form-row { display: flex; gap: 10px; }
    .form-row .btn { flex: 1; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="kente"></div>
<header id="header" style="display: none;">
    <span class="logo">BLK</span>
    <span id="userNameHeader" style="font-size: 13px; font-weight: 600; color: #FFA500;"></span>
</header>

<!-- AUTH PAGE -->
<div id="authPage" class="page active">
    <div class="auth-page login" id="loginContainer">
        <div class="auth-box">
            <h2 id="authTitle">Se connecter</h2>

        <!-- LOGIN FORM -->
        <div id="loginForm">
            <div class="form-group">
                <label>Numéro de téléphone</label>
                <input type="tel" id="loginPhone" placeholder="+242 06 XXX XXXX" />
            </div>
            <div id="recaptchaContainer"></div>
            <button class="btn btn-primary" id="btnSendOTP">Envoyer le code</button>
        </div>

        <!-- OTP FORM -->
        <div id="otpForm" style="display: none;">
            <div class="form-group">
                <label>Code SMS (6 chiffres)</label>
                <input type="text" id="otpCode" placeholder="000000" maxlength="6" />
            </div>
            <button class="btn btn-primary" id="btnVerifyOTP">Vérifier</button>
            <button class="btn btn-primary" id="btnResetOTP" style="margin-top: 8px; background: transparent; color: #666; border-color: #ccc;">Retour</button>
        </div>

        <!-- SIGNUP FORM -->
        <div id="signupForm" style="display: none;">
            <div class="form-group">
                <label>Nom complet</label>
                <input type="text" id="signupName" placeholder="Ton nom" />
            </div>
            <div class="form-group">
                <label>Numéro de téléphone</label>
                <input type="tel" id="signupPhone" placeholder="+242 06 XXX XXXX" />
            </div>
            <div id="signupRecaptchaContainer"></div>
            <button class="btn btn-primary" id="btnSendSignupOTP">S'inscrire</button>
            <button class="btn btn-primary" id="btnBackToLogin" style="margin-top: 8px; background: transparent; color: #666; border-color: #ccc;">Connexion</button>
        </div>

        <div class="toggle-form">
            <span id="toggleText">Pas de compte? </span>
            <button type="button" id="btnToggleForms">S'inscrire</button>
        </div>
    </div>
</div>
</div>

<!-- MAIN APP -->
<div id="container" class="container">
    <div id="alertBox" class="alert"></div>

<!-- HOME PAGE -->
<div id="homePage" class="page active">
    <h1>Découvrir</h1>
    <div class="glass-container">
        <input type="text" id="searchInput" placeholder="Chercher..." style="width: 100%; padding: 12px;" />
    </div>
    <div id="productsGrid" class="grid"></div>
    <div id="emptyHome" class="empty-state">Aucun article</div>
</div>

<!-- SELL PAGE -->
<div id="sellPage" class="page">
    <h1>Publier</h1>
    <div class="glass-container">
        <form id="publishForm">
            <div class="form-group">
                <label>Titre</label>
                <input type="text" id="articleTitle" placeholder="Robe vintage..." />
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="articleDesc" rows="3" placeholder="Décris l'article..."></textarea>
            </div>
            <div class="form-group">
                <label>Prix (FCFA)</label>
                <input type="number" id="articlePrice" placeholder="5000" />
            </div>
            <div class="form-group">
                <label>Catégorie</label>
                <select id="articleCategory">
                    <option value="">-- Sélectionner --</option>
                    <option value="vetements">Vêtements</option>
                    <option value="chaussures">Chaussures</option>
                    <option value="accessoires">Accessoires</option>
                </select>
            </div>
            <div class="form-group">
                <label>Photo</label>
                <input type="file" id="articleImage" accept="image/*" />
            </div>
            <button type="submit" class="btn btn-primary">Publier</button>
        </form>
    </div>
</div>

<!-- MESSAGES PAGE -->
<div id="messagesPage" class="page">
    <h1>Messages</h1>
    <div class="glass-container">
        <div id="messagesList" style="max-height: 400px; overflow-y: auto;"></div>
        <div id="emptyMessages" class="empty-state">Aucun message</div>
    </div>
    <div class="glass-container">
        <input type="text" id="messageInput" placeholder="Message..." style="margin-bottom: 10px; width: 100%;" />
        <button class="btn btn-success" id="btnSendMessage" style="padding: 10px;">Envoyer</button>
    </div>
</div>

<!-- ORDERS PAGE -->
<div id="ordersPage" class="page">
    <h1>Commandes</h1>
    <div id="ordersList"></div>
    <div id="emptyOrders" class="empty-state">Aucune commande</div>
</div>

<!-- PROFILE PAGE -->
<div id="profilePage" class="page">
    <h1>Profil</h1>
    <div id="profileNotAuth" class="empty-state">Connecte-toi</div>
    <div id="profileAuth" style="display: none;">
        <div class="glass-container">
            <h3>Infos</h3>
            <p id="profileName" style="font-weight: 700;"></p>
            <p id="profilePhone" style="font-size: 12px; color: rgba(0,0,0,0.6);"></p>
            <button class="btn btn-danger" id="btnLogout" style="margin-top: 16px; padding: 10px;">Déconnexion</button>
        </div>

        <div class="card">
            <h3>Fiabilité: <span id="flamesCount">0</span> 🔥</h3>
        </div>

        <div class="glass-container">
            <h3 style="color: #2ECC71;">Wallet BLK</h3>
            <p style="margin: 16px 0; font-size: 28px; font-weight: 800; color: #2ECC71;"><span id="walletBalance">0</span> FCFA</p>
            <button class="btn btn-success" id="btnToggleDeposit" style="margin-bottom: 8px;">Ajouter argent</button>
            <button class="btn btn-primary" id="btnToggleWithdraw">Retirer</button>
        </div>

        <div id="depositForm" class="glass-container" style="display: none;">
            <h3>Dépôt</h3>
            <input type="number" id="depositAmount" placeholder="Montant" style="margin-bottom: 10px;" />
            <button class="btn btn-success" id="btnInitiateDeposit" style="padding: 10px;">Payer</button>
            <button class="btn btn-primary" id="btnCancelDeposit" style="margin-top: 8px; padding: 10px;">Annuler</button>
        </div>

        <div id="withdrawForm" class="glass-container" style="display: none;">
            <h3>Retrait</h3>
            <input type="number" id="withdrawAmount" placeholder="Montant" style="margin-bottom: 10px;" />
            <button class="btn btn-danger" id="btnInitiateWithdraw" style="padding: 10px;">Demander</button>
            <button class="btn btn-primary" id="btnCancelWithdraw" style="margin-top: 8px; padding: 10px;">Annuler</button>
        </div>
    </div>
</div>
</div>

<!-- TABS -->
<nav class="tabs" id="tabs" style="display: none;">
    <button class="tab-btn active" data-page="homePage" id="tabHome">🏠 Accueil</button>
    <button class="tab-btn" data-page="sellPage" id="tabSell">📤 Vendre</button>
    <button class="tab-btn" data-page="messagesPage" id="tabMessages">💬 Chat</button>
    <button class="tab-btn" data-page="ordersPage" id="tabOrders">📦 Commandes</button>
    <button class="tab-btn" data-page="profilePage" id="tabProfile">👤 Profil</button>
</nav>

<script>
// 
// 1. CONFIGURATION FIREBASE
// 
const firebaseConfig = {
  apiKey: "AIzaSyA210LGSiktib7iFT82s2HZR1IcSMqmf38",
  authDomain: "blk-congo.firebaseapp.com",
  projectId: "blk-congo",
  storageBucket: "blk-congo.firebasestorage.app",
  messagingSenderId: "1067239289658",
  appId: "1:1067239289658:web:a24aba40f2999201349603"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const BACKEND_URL = 'https://blk-marketplace-7vig.onrender.com';

let confirmationResult = null;
let pendingPhoneNumber = '';

// 
// 2. FONCTIONS AUTHENTIFICATION
// 

function showAlert(message, type = 'success') {
    const box = document.getElementById('alertBox');
    if (!box) return;
    box.textContent = message;
    box.className = `alert alert-${type} active`;
    clearTimeout(box._timeout);
    box._timeout = setTimeout(() => box.classList.remove('active'), 4000);
}

function showMainApp() {
    document.getElementById('authPage').classList.remove('active');
    document.getElementById('container').classList.add('active');
    document.getElementById('header').style.display = 'flex';
    document.getElementById('tabs').style.display = 'flex';
    loadProducts();
    loadUserBalance();
    loadFlames();
    setupMessageListener();
    loadOrders();
}

function hideMainApp() {
    document.getElementById('authPage').classList.add('active');
    document.getElementById('container').classList.remove('active');
    document.getElementById('header').style.display = 'none';
    document.getElementById('tabs').style.display = 'none';
}

// ---- Connexion ----
function sendPhoneOTP() {
    const phone = document.getElementById('loginPhone').value.trim();
    if (!phone) {
        showAlert('Entre ton numéro de téléphone', 'error');
        return;
    }

    try {
        const appVerifier = new firebase.auth.RecaptchaVerifier('recaptchaContainer', { size: 'normal' });
        
        auth.signInWithPhoneNumber(phone, appVerifier)
            .then(result => {
                confirmationResult = result;
                pendingPhoneNumber = phone;
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('otpForm').style.display = 'block';
                showAlert('📱 Code SMS envoyé !', 'success');
            })
            .catch(error => {
                console.error('Erreur Firebase:', error);
                showAlert('Erreur: ' + error.message, 'error');
            });
    } catch (error) {
        showAlert('ReCAPTCHA non chargé, recharge la page', 'error');
    }
}

function verifyOTP() {
    const code = document.getElementById('otpCode').value.trim();
    if (!code || code.length < 6) {
        showAlert('Entre les 6 chiffres du code', 'error');
        return;
    }

    if (!confirmationResult) {
        showAlert('Demande un nouveau code', 'error');
        return;
    }

    confirmationResult.confirm(code)
        .then(result => {
            const user = result.user;
            showAlert('✅ Connecté !', 'success');
            document.getElementById('otpForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('otpCode').value = '';
            showMainApp();
        })
        .catch(error => {
            console.error('Erreur vérification:', error);
            showAlert('❌ Code invalide ou expiré', 'error');
        });
}

function resetOTP() {
    document.getElementById('otpCode').value = '';
    document.getElementById('otpForm').style.display = 'none';
    document.getElementById('loginForm').style.display = 'block';
}

// ---- Inscription ----
function sendSignupOTP() {
    const name = document.getElementById('signupName').value.trim();
    const phone = document.getElementById('signupPhone').value.trim();

    if (!name) {
        showAlert('Entre ton nom complet', 'error');
        return;
    }
    if (!phone) {
        showAlert('Entre ton numéro de téléphone', 'error');
        return;
    }

    try {
        const appVerifier = new firebase.auth.RecaptchaVerifier('signupRecaptchaContainer', { size: 'normal' });
        
        auth.signInWithPhoneNumber(phone, appVerifier)
            .then(result => {
                confirmationResult = result;
                pendingPhoneNumber = phone;
                document.getElementById('signupForm').innerHTML = `
                    <div class="form-group">
                        <label>Code SMS (6 chiffres)</label>
                        <input type="text" id="signupOtp" placeholder="000000" maxlength="6" />
                    </div>
                    <button class="btn btn-primary" id="btnVerifySignup">Créer le compte</button>
                    <button class="btn btn-primary" id="btnSignupBack" style="margin-top: 8px; background: transparent; color: #666; border-color: #ccc;">Retour</button>
                `;
                document.getElementById('btnVerifySignup').addEventListener('click', function() {
                    verifySignupOTP(name);
                });
                document.getElementById('btnSignupBack').addEventListener('click', function() {
                    toggleForms();
                });
                showAlert('📱 Code SMS envoyé !', 'success');
            })
            .catch(error => {
                console.error('Erreur Firebase:', error);
                showAlert('Erreur: ' + error.message, 'error');
            });
    } catch (error) {
        showAlert('ReCAPTCHA non chargé, recharge la page', 'error');
    }
}

function verifySignupOTP(name) {
    const code = document.getElementById('signupOp')?.value.trim();
    if (!code || code.length < 6) {
        showAlert('Entre les 6 chiffres du code', 'error');
        return;
    }

    if (!confirmationResult) {
        showAlert('Demande un nouveau code', 'error');
        return;
    }

    confirmationResult.confirm(code)
        .then(result => {
            const user = result.user;
            return db.collection('users').doc(user.uid).set({
                name: name,
                phone: pendingPhoneNumber,
                walletBalance: 0,
                flames: 0,
                createdAt: new Date()
            }).then(() => {
                showAlert('🎉 Compte créé avec succès !', 'success');
                showMainApp();
            });
        })
        .catch(error => {
            console.error('Erreur création compte:', error);
            showAlert('❌ Code invalide ou expiré', 'error');
        });
}

// ---- Basculer Connexion/Inscription ----
function toggleForms() {
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const title = document.getElementById('authTitle');
    const container = document.getElementById('loginContainer');

    if (loginForm.style.display ! 'none') {
        loginForm.style.display = 'none';
        signupForm.style.display = 'block';
        title.textContent = "S'inscrire";
        container.className = 'auth-page signup';
        document.getElementById('toggleText').textContent = 'Déjà un compte? ';
        document.getElementById('btnToggleForms').textContent = 'Se connecter';
    } else {
        loginForm.style.display = 'block';
        signupForm.style.display = 'none';
        title.textContent = 'Se connecter';
        container.className = 'auth-page login';
        document.getElementById('toggleText').textContent = 'Pas de compte? ';
        document.getElementById('btnToggleForms').textContent = 'S\'inscrire';
    }
}

// ---- Navigation ----
function switchPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    const btn = document.querySelector(`.tab-btn[data-page="${pageId}"]`);
    if (btn) btn.classList.add('active');
}

// 
// 3. FONCTIONS PRODUITS
// 

async function loadProducts() {
    try {
        const response = await fetch(`${BACKEND_URL}/api/articles`);
        const data = await response.json();
        const grid = document.getElementById('productsGrid');
        const empty = document.getElementById('emptyHome');
        
        if (!data.data || data.data.length = 0) {
            grid.innerHTML = '';
            empty.style.display = 'block';
            return;
        }

        empty.style.display = 'none';
        grid.innerHTML = '';
        data.data.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                ${product.image ? `<img src="${product.image}" class="product-img" />` : `<div class="product-img"></div>`}
                <div class="product-info">
                    <div class="product-title">${product.title || 'Sans titre'}</div>
                    <div class="product-price">${product.price || 0} FCFA</div>
                </div>
            `;
            card.addEventListener('click', () => showProductModal(product));
            grid.appendChild(card);
        });
    } catch (error) {
        console.error('Erreur chargement produits:', error);
        showAlert('Erreur chargement des articles', 'error');
    }
}

function showProductModal(product) {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `
        <div class="modal-content">
            <button class="modal-close" id="modalCloseBtn">✕</button>
            ${product.image ? `<img src="${product.image}" style="width: 100%; height: 240px; object-fit: cover; border-radius: 12px; margin-bottom: 16px;" />` : ''}
            <h3>${product.title || 'Sans titre'}</h3>
            <p style="color: rgba(0,0,0,0.6); margin: 12px 0;">${product.description || 'Aucune description'}</p>
            <p style="font-size: 24px; font-weight: 800; color: #FFA500;">${product.price || 0} FCFA</p>
            <button class="btn btn-success" id="modalAddToCart">Ajouter au panier</button>
        </div>
    `;
    document.body.appendChild(modal);
    
    document.getElementById('modalCloseBtn').addEventListener('click', () => modal.remove());
    document.getElementById('modalAddToCart').addEventListener('click', () => {
        addToCart(product);
        modal.remove();
    });
    modal.addEventListener('click', (e) => {
        if (e.target = modal) modal.remove();
    });
}

let cart = [];

function addToCart(product) {
    cart.push(product);
    showAlert(`"${product.title}" ajouté au panier`, 'success');
}

// 
// 4. FONCTIONS PUBLICATION
// 

document.getElementById('publishForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const user = auth.currentUser;
    if (!user) {
        showAlert('Connecte-toi pour publier', 'error');
        return;
    }

    const title = document.getElementById('articleTitle').value.trim();
    const desc = document.getElementById('articleDesc').value.trim();
    const price = document.getElementById('articlePrice').value;
    const category = document.getElementById('articleCategory').value;
    const imageFile = document.getElementById('articleImage').files[0];

    if (!title || !desc || !price) {
        showAlert('Remplis tous les champs', 'error');
        return;
    }

    let imageUrl = '';
    if (imageFile) {
        const reader = new FileReader();
        reader.onload = async (event) => {
            try {
                const res = await fetch(`${BACKEND_URL}/api/upload`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ base64: event.target.result })
                });
                const data = await res.json();
                imageUrl = data.url || '';
                await publishArticle(title, desc, price, category, imageUrl, user);
            } catch (error) {
                showAlert('Erreur upload image', 'error');
            }
        };
        reader.readAsDataURL(imageFile);
    } else {
        await publishArticle(title, desc, price, category, '', user);
    }
});

async function publishArticle(title, desc, price, category, imageUrl, user) {
    try {
        const res = await fetch(`${BACKEND_URL}/api/articles`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                title,
                description: desc,
                price: parseInt(price),
                category,
                image: imageUrl,
                sellerId: user.uid,
                sellerName: user.displayName || 'Anonyme'
            })
        });
        if (res.ok) {
            showAlert('🎉 Article publié !', 'success');
            document.getElementById('publishForm').reset();
            loadProducts();
        } else {
            const error = await res.json();
            showAlert('Erreur: ' + error.message, 'error');
        }
    } catch (error) {
        showAlert('Erreur publication', 'error');
    }
}

async function loadUserBalance() {
    const user = auth.currentUser;
    if (!user) return;
    try {
        const res = await fetch(`${BACKEND_URL}/api/wallet/${user.uid}`);
        const data = await res.json();
        document.getElementById('walletBalance').textContent = data.balance || 0;

function toggleDepositForm() {
    const form = document.getElementById('depositForm');
    form.style.display = form.style.display = 'none' ? 'block' : 'none';
}

function toggleWithdrawForm() {
    const form = document.getElementById('withdrawForm');
    form.style.display = form.style.display = 'none' ? 'block' : 'none';
}

async function initiateDeposit() {
    const user = auth.currentUser;
    if (!user) {
        showAlert('Connecte-toi', 'error');
        return;
    }
    const amount = document.getElementById('depositAmount').value;
    if (!amount || parseInt(amount) <= 0) {
        showAlert('Entre un montant valide', 'error');
        return;
    }

    try {
        const res = await fetch(`${BACKEND_URL}/api/payment/initiate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                amount: parseInt(amount),
                phone: user.phoneNumber || '',
                userId: user.uid,
                type: 'deposit'
            })
        });
        const data = await res.json();
        if (data.success) {
            showAlert('💳 Paiement initié !', 'success');
            document.getElementById('depositAmount').value = '';
            toggleDepositForm();
        } else {
            showAlert('Erreur: ' + data.message, 'error');
        }
    } catch (error) {
        showAlert('Erreur paiement', 'error');
    }
}

async function initiateWithdraw() {
    const user = auth.currentUser;
    if (!user) {
        showAlert('Connecte-toi', 'error');
        return;
    }
    const amount = document.getElementById('withdrawAmount').value;
    if (!amount || parseInt(amount) <= 0) {
        showAlert('Entre un montant valide', 'error');
        return;
    }

    try {
        const res = await fetch(`${BACKEND_URL}/api/wallet/withdraw`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                userId: user.uid,
                amount: parseInt(amount)
            })
        });
        const data = await res.json();
        if (data.success) {
            showAlert('💰 Retrait demandé !', 'success');
            document.getElementById('withdrawAmount').value = '';
            toggleWithdrawForm();
            loadUserBalance();
        } else {
            showAlert('Erreur: ' + data.message, 'error');
        }
    } catch (error) {
        showAlert('Erreur retrait', 'error');
    }
}

function setupMessageListener() {
    const user = auth.currentUser;
    if (!user) return;

    db.collection('messages')
        .where('receiverId', '', user.uid)
        .orderBy('createdAt', 'desc')
        .limit(50)
        .onSnapshot(snapshot => {
            const list = document.getElementById('messagesList');
            const empty = document.getElementById('emptyMessages');
            list.innerHTML = '';
            
            if (snapshot.empty) {
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            snapshot.forEach(doc => {
                const msg = doc.data();
                const item = document.createElement('div');
                item.className = 'message-item';
                item.innerHTML = `
                    <div class="message-sender">${msg.senderName || 'Anonyme'}</div>
                    <div class="message-text">${msg.text}</div>
                `;
                list.appendChild(item);
            });
        }, error => {
            console.error('Erreur messages:', error);
        });
}

async function sendMessage() {
    const user = auth.currentUser;
    if (!user) {
        showAlert('Connecte-toi', 'error');
        return;
    }
    const text = document.getElementById('messageInput').value.trim();
    if (!text) {
        showAlert('Écris un message', 'error');
        return;
    }

    try {
        await db.collection('messages').add({
            senderId: user.uid,
            senderName: user.displayName || 'Anonyme',
            receiverId: 'admin',
            text: text,
            createdAt: new Date()
        });
        document.getElementById('messageInput').value = '';
        showAlert('💬 Message envoyé', 'success');
    } catch (error) {
        showAlert('Erreur envoi message', 'error');
    }
}

async function loadFlames() {

    }
}

async function loadOrders() {
    const user = auth.currentUser;
    if (!user) return;

    try {
        const res = await fetch(`${BACKEND_URL}/api/orders/${user.uid}`);
        const orders = await res.json();
        const list = document.getElementById('ordersList');
        const empty = document.getElementById('emptyOrders');
        
        if (!orders || orders.length = 0) {
            empty.style.display = 'block';
            list.innerHTML = '';
            return;
        }

        empty.style.display = 'none';
        list.innerHTML = '';
        
        orders.forEach(order => {
            const expiresAt = order.expiresAt ? new Date(order.expiresAt.toDate ? order.expiresAt.toDate() : order.expiresAt) : null;
            const now = new Date();
            const timeLeft = expiresAt ? Math.max(0, Math.floor((expiresAt - now) / 1000)) : 0;
            const hours = Math.floor(timeLeft / 3600);
            const mins = Math.floor((timeLeft % 3600) / 60);
            const isDanger = timeLeft < 3600;
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <h3>Commande #${order.id.slice(0, 8)}</h3>
                <p style="font-size: 12px; color: rgba(0,0,0,0.5);">Status: <strong>${order.status || 'En cours'}</strong></p>
                <p style="font-size: 14px; color: #FFA500; font-weight: 700;">${order.total || 0} FCFA</p>
                <div class="timer ${isDanger ? 'danger' : ''}">${hours}h ${mins}m</div>
                <div style="display: flex; gap: 8px; margin-top: 12px;">
                    <button class="btn btn-danger cancel-order-btn" data-id="${order.id}" style="flex: 1; padding: 10px; font-size: 12px;">Annuler</button>
                    <button class="btn btn-success extend-order-btn" data-id="${order.id}" style="flex: 1; padding: 10px; font-size: 12px;">Prolonger</button>
                </div>
            `;
            list.appendChild(card);

            card.querySelector('.cancel-order-btn').addEventListener('click', () => cancelOrder(order.id));
            card.querySelector('.extend-order-btn').addEventListener('click', () => extendOrder(order.id));
        });
    } catch (error) {
        console.error('Erreur chargement commandes:', error);
    }
}

async function cancelOrder(id) {
    try {
        const res = await fetch(`${BACKEND_URL}/api/orders/${id}/cancel`, { method: 'POST' });
        if (res.ok) {
            showAlert('Commande annulée', 'success');
            loadOrders();
        } else {
            const error = await res.json();
            showAlert('Erreur: ' + error.message, 'error');
        }
    } catch (error) {
        showAlert('Erreur annulation', 'error');
    }
}

async function extendOrder(id) {
    try {
        const res = await fetch(`${BACKEND_URL}/api/orders/${id}/extend`, { method: 'POST' });
        if (res.ok) {
            showAlert('Prolongée de 24h', 'success');
            loadOrders();
        } else {
            const error = await res.json();
            showAlert('Erreur: ' + error.message, 'error');
        }
    } catch (error) {
        showAlert('Erreur prolongation', 'error');
    }
}
