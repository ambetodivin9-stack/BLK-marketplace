<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLK Marketplace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f0e8; padding-bottom: 80px; }
        .kente { height: 6px; background: linear-gradient(90deg, #FFD700 20%, #2ECC71 40%, #E74C3C 60%, #FFD700 80%); }
        .btn { padding: 14px; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; width: 100%; background: #E74C3C; color: white; }
        .btn-primary { background: #E74C3C; color: white; }
        .btn-success { background: #2ECC71; color: white; }
        .btn-danger { background: #E74C3C; color: white; }
        .btn-outline { background: transparent; border: 2px solid #E74C3C; color: #E74C3C; }
        .glass { background: rgba(255,255,255,0.8); border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.4); }
        .auth-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #FFD700, #FF8C00); }
        .auth-page .card { background: rgba(255,255,255,0.85); padding: 32px; border-radius: 24px; max-width: 400px; width: 100%; }
        .auth-page h1 { text-align: center; font-size: 32px; }
        .auth-page input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 14px; margin-bottom: 12px; }
        .app { display: none; max-width: 600px; margin: 0 auto; padding: 80px 16px 100px; }
        .app.active { display: block; }
        .search-bar { display: flex; background: rgba(255,255,255,0.8); border-radius: 14px; padding: 6px 16px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.4); }
        .search-bar input { flex: 1; padding: 10px 0; border: none; background: transparent; font-size: 16px; outline: none; }
        .tabs { position: fixed; bottom: 0; left: 0; right: 0; display: none; background: rgba(255,255,255,0.8); border-top: 1px solid rgba(255,255,255,0.4); padding: 8px; z-index: 100; }
        .tabs.show { display: flex; }
        .tab-btn { flex: 1; border: none; background: none; cursor: pointer; font-size: 12px; font-weight: 600; color: #999; padding: 4px; }
        .tab-btn.active { color: #E74C3C; background: rgba(231,76,60,0.1); border-radius: 10px; }
        .page { display: none; }
        .page.active { display: block; }
        .alert { padding: 12px; border-radius: 12px; margin-bottom: 12px; display: none; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .product-card { background: rgba(255,255,255,0.8); border-radius: 14px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255,255,255,0.4); }
        .product-card img { width: 100%; height: 150px; object-fit: cover; }
        .product-card .info { padding: 12px; }
        .product-card .title { font-weight: 700; }
        .product-card .price { font-weight: 800; color: #E74C3C; }
        .wallet-balance { font-size: 32px; font-weight: 800; color: #2ECC71; }
        .empty { text-align: center; color: #999; padding: 20px; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal-box { background: white; border-radius: 20px; max-width: 400px; width: 100%; padding: 24px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="kente"></div>

<!-- AUTH -->
<div class="auth-page" id="authPage">
    <div class="card">
        <h1>BLK</h1>
        <p>Bienvenue sur BLK Marketplace</p>
        <input type="text" id="loginName" placeholder="Nom complet" value="Divin Ambeto">
        <input type="email" id="loginEmail" placeholder="Adresse e-mail" value="ambetodivin9@gmail.com">
        <button class="btn btn-primary" id="btnLogin">Se connecter</button>
    </div>
</div>

<!-- WELCOME -->
<div class="welcome-screen" id="welcomeScreen" style="display:none; align-items:center; justify-content:center; min-height:100vh; padding:40px; background:linear-gradient(135deg,#FFD700,#2ECC71,#E74C3C); text-align:center; color:white;">
    <div>
        <h1 style="font-size:48px;">BLK<span style="color:#1a1a1a;">.</span></h1>
        <p>Bienvenue dans l'univers BLK</p>
        <button class="btn" id="welcomeBtn" style="background:white; color:#1a1a1a; max-width:280px; margin:0 auto;">Découvrir</button>
    </div>
</div>

<!-- APP -->
<div class="app" id="appContainer">
    <div id="alertBox" class="alert"></div>

    <!-- ACCUEIL -->
    <div class="page active" id="pageHome">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Rechercher...">
        </div>
        <div id="categoryFilters" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;">
            <button class="btn btn-sm btn-primary" style="padding:6px 14px; font-size:12px; width:auto;" data-cat="all">Tous</button>
            <button class="btn btn-sm btn-outline" style="padding:6px 14px; font-size:12px; width:auto;" data-cat="vêtements">Vêtements</button>
            <button class="btn btn-sm btn-outline" style="padding:6px 14px; font-size:12px; width:auto;" data-cat="chaussures">Chaussures</button>
            <button class="btn btn-sm btn-outline" style="padding:6px 14px; font-size:12px; width:auto;" data-cat="sacs">Sacs</button>
            <button class="btn btn-sm btn-outline" style="padding:6px 14px; font-size:12px; width:auto;" data-cat="bijoux">Bijoux</button>
            <button class="btn btn-sm btn-outline" style="padding:6px 14px; font-size:12px; width:auto;" data-cat="accessoires">Accessoires</button>
        </div>
        <div id="productsGrid" class="grid"></div>
        <div id="emptyHome" class="empty" style="display:none;">Aucun article</div>
    </div>

    <!-- MON MAGASIN -->
    <div class="page" id="pageShop">
        <h2 style="color:#E74C3C;">Mon Magasin</h2>
        <button class="btn btn-primary" id="btnPublish">📤 Publier un article</button>
        <div id="shopArticles" style="margin-top:12px;"></div>
    </div>

    <!-- MESSAGERIE -->
    <div class="page" id="pageMessages">
        <h2 style="color:#E74C3C;">Messagerie</h2>
        <div id="contactsList"></div>
        <div id="emptyMessages" class="empty" style="display:block;">Aucune discussion</div>
    </div>

    <!-- MES COMMANDES -->
    <div class="page" id="pageOrders">
        <h2 style="color:#E74C3C;">Mes Commandes</h2>
        <div id="ordersList"></div>
        <div id="emptyOrders" class="empty" style="display:none;">Aucune commande</div>
    </div>

    <!-- MON PROFIL -->
    <div class="page" id="pageProfile">
        <h2 style="color:#E74C3C;">Mon Profil</h2>
        <div class="glass">
            <h3 id="profileName">Utilisateur</h3>
            <p id="profileEmail">email@example.com</p>
            <p id="profilePhone">+242 06 XXX XXXX</p>
            <p>🔥 <span id="profileFlames">0</span> flammes</p>
        </div>
        <div class="glass">
            <h3 style="color:#2ECC71;">💰 Wallet BLK</h3>
            <p class="wallet-balance"><span id="walletBalance">0</span> FCFA</p>
            <button class="btn btn-success" id="btnDeposit">Déposer</button>
            <button class="btn btn-primary" id="btnWithdraw" style="margin-top:8px;">Retirer</button>
        </div>
        <button class="btn btn-danger" id="btnLogout">🚪 Déconnexion</button>
    </div>
</div>

<!-- TABS -->
<div class="tabs" id="tabs">
    <button class="tab-btn active" data-page="pageHome">Accueil</button>
    <button class="tab-btn" data-page="pageShop">Mon Magasin</button>
    <button class="tab-btn" data-page="pageMessages">Messagerie</button>
    <button class="tab-btn" data-page="pageOrders">Mes Commandes</button>
    <button class="tab-btn" data-page="pageProfile">Mon Profil</button>
</div>

<script>
    // ============================================================
    // CONFIGURATION
    // ============================================================
    var BACKEND_URL = 'https://blk-marketplace2-0.onrender.com';
    var STORAGE_KEY = 'blk_user_id';
    var currentUser = null;
    var currentUserId = null;
    var allProducts = [];
    var selectedCategory = 'all';

    function showAlert(message, type) {
        var box = document.getElementById('alertBox');
        box.textContent = message;
        box.className = 'alert alert-' + (type || 'success');
        box.style.display = 'block';
        clearTimeout(box._timeout);
        box._timeout = setTimeout(function() { box.style.display = 'none'; }, 5000);
    }

    function openModal(html) {
        var overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = '<div class="modal-box">' + html + '</div>';
        overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
        document.body.appendChild(overlay);
        return overlay;
    }

    // ============================================================
    // AUTH
    // ============================================================
    function handleLogin(name, email) {
        var userId = localStorage.getItem(STORAGE_KEY);
        if (!userId) {
            userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem(STORAGE_KEY, userId);
        }
        currentUserId = userId;
        currentUser = {
            name: name || 'Utilisateur',
            email: email || 'user@example.com',
            phone: '+242 06 XXX XXXX',
            walletBalance: 0,
            id: userId,
            isSeller: false
        };
        document.getElementById('authPage').style.display = 'none';
        document.getElementById('welcomeScreen').style.display = 'flex';
        document.getElementById('welcomeBtn').onclick = function() {
            document.getElementById('welcomeScreen').style.display = 'none';
            showMainApp();
            showAlert('Bienvenue ' + currentUser.name, 'success');
        };
    }

    document.getElementById('btnLogin').addEventListener('click', function() {
        var name = document.getElementById('loginName').value.trim() || 'Utilisateur';
        var email = document.getElementById('loginEmail').value.trim() || 'user@example.com';
        handleLogin(name, email);
    });

    // ============================================================
    // MAIN APP
    // ============================================================
    function showMainApp() {
        document.getElementById('appContainer').classList.add('active');
        document.getElementById('tabs').classList.add('show');
        document.getElementById('profileName').textContent = currentUser.name;
        document.getElementById('profileEmail').textContent = currentUser.email;
        document.getElementById('profilePhone').textContent = currentUser.phone;
        document.getElementById('profileFlames').textContent = 0;
        document.getElementById('walletBalance').textContent = currentUser.walletBalance;
        loadProducts();
        loadWallet();
        loadOrders();
        loadMessages();
        loadShopArticles();
    }

    // ============================================================
    // TABS
    // ============================================================
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
            document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
            this.classList.add('active');
            document.getElementById(this.dataset.page).classList.add('active');
            if (this.dataset.page === 'pageOrders') loadOrders();
            if (this.dataset.page === 'pageMessages') loadMessages();
            if (this.dataset.page === 'pageShop') loadShopArticles();
        });
    });

    // ============================================================
    // PRODUCTS
    // ============================================================
    function loadProducts() {
        fetch(BACKEND_URL + '/api/articles')
            .then(function(res) { return res.json(); })
            .then(function(data) {
                allProducts = (data.success && data.data) ? data.data : [];
                renderProducts(allProducts);
            })
            .catch(function() { allProducts = []; renderProducts(allProducts); });
    }

    function renderProducts(products) {
        var grid = document.getElementById('productsGrid');
        var empty = document.getElementById('emptyHome');
        var filtered = products;
        if (selectedCategory !== 'all') {
            filtered = products.filter(function(p) { return p.category === selectedCategory; });
        }
        var q = document.getElementById('searchInput').value.toLowerCase();
        if (q) {
            filtered = filtered.filter(function(p) { return p.title && p.title.toLowerCase().includes(q); });
        }
        if (filtered.length === 0) {
            grid.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';
        grid.innerHTML = '';
        filtered.forEach(function(p) {
            var card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = '<img src="' + (p.image || 'https://via.placeholder.com/150x150/F5F0E8/CCCCCC?text=BLK') + '" /><div class="info"><div class="title">' + (p.title || 'Sans titre') + '</div><div class="price">' + (p.price || 0) + ' FCFA</div></div>';
            card.addEventListener('click', function() { showProductDetail(p); });
            grid.appendChild(card);
        });
    }

    document.getElementById('searchInput').addEventListener('input', function() { renderProducts(allProducts); });

    document.querySelectorAll('#categoryFilters .btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('#categoryFilters .btn').forEach(function(b) { b.className = 'btn btn-sm btn-outline'; });
            this.className = 'btn btn-sm btn-primary';
            selectedCategory = this.dataset.cat;
            renderProducts(allProducts);
        });
    });

    function showProductDetail(product) {
        var html = '<button onclick="this.parentElement.parentElement.remove()" style="float:right; background:none; border:none; font-size:24px; cursor:pointer;">✕</button>';
        html += '<img src="' + (product.image || 'https://via.placeholder.com/400x300/F5F0E8/CCCCCC?text=BLK') + '" style="width:100%; height:200px; object-fit:cover; border-radius:12px; margin-bottom:12px;" />';
        html += '<h3>' + (product.title || 'Sans titre') + '</h3>';
        html += '<p style="color:#666;">' + (product.description || 'Aucune description') + '</p>';
        html += '<p style="font-size:24px; font-weight:800; color:#E74C3C;">' + (product.price || 0) + ' FCFA</p>';
        html += '<p style="font-size:12px; color:#999;">Vendeur: ' + (product.sellerName || 'Anonyme') + '</p>';
        html += '<div style="display:flex; gap:8px; margin-top:12px;">';
        html += '<button class="btn btn-primary" onclick="buyProduct(\'' + product.id + '\', ' + product.price + ', \'' + product.sellerId + '\')" style="flex:1;">Acheter</button>';
        html += '</div>';
        openModal(html);
    }

    function buyProduct(articleId, price, sellerId) {
        if (!currentUserId) { showAlert('Connecte-toi d\'abord', 'error'); return; }
        showAlert('⏳ Création de la commande...', 'info');
        fetch(BACKEND_URL + '/api/orders/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                articleId: articleId,
                buyerId: currentUserId,
                sellerId: sellerId,
                amount: price,
                buyerPhone: currentUser.phone || '065918166'
            })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (data.success) {
                showAlert('✅ Commande créée !', 'success');
                loadWallet();
                loadOrders();
                loadProducts();
            } else {
                showAlert('❌ ' + data.message, 'error');
            }
        })
        .catch(function(e) { showAlert('❌ Erreur: ' + e.message, 'error'); });
    }

    // ============================================================
    // WALLET
    // ============================================================
    function loadWallet() {
        if (!currentUserId) return;
        fetch(BACKEND_URL + '/api/wallet/' + currentUserId)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                document.getElementById('walletBalance').textContent = data.balance || 0;
            })
            .catch(function(e) { console.error(e); });
    }

    document.getElementById('btnDeposit').addEventListener('click', function() {
        var amount = prompt('Montant (FCFA) :', '500');
        if (!amount) return;
        var phone = prompt('Numéro MTN :', '065918166');
        if (!phone) return;
        fetch(BACKEND_URL + '/api/wallet/deposit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: currentUserId, amount: parseInt(amount), phone: phone })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (data.success) {
                showAlert('💰 ' + data.message, 'success');
                loadWallet();
            } else {
                showAlert('❌ ' + data.message, 'error');
            }
        })
        .catch(function(e) { showAlert('❌ Erreur: ' + e.message, 'error'); });
    });

    document.getElementById('btnWithdraw').addEventListener('click', function() {
        showAlert('🔧 Retrait en développement', 'info');
    });

    // ============================================================
    // ORDERS
    // ============================================================
    function loadOrders() {
        if (!currentUserId) return;
        fetch(BACKEND_URL + '/api/orders/' + currentUserId)
            .then(function(res) { return res.json(); })
            .then(function(orders) {
                var container = document.getElementById('ordersList');
                var empty = document.getElementById('emptyOrders');
                if (!orders || orders.length === 0) {
                    container.innerHTML = '';
                    empty.style.display = 'block';
                    return;
                }
                empty.style.display = 'none';
                container.innerHTML = '';
                orders.forEach(function(order) {
                    var card = document.createElement('div');
                    card.className = 'glass';
                    card.style.marginBottom = '12px';
                    card.innerHTML = '<div><strong>' + (order.article?.title || 'Article') + '</strong><br>' + (order.totalAmount || order.amount) + ' FCFA</div>';
                    container.appendChild(card);
                });
            })
            .catch(function(e) { console.error(e); });
    }

    // ============================================================
    // MESSAGES
    // ============================================================
    function loadMessages() {
        if (!currentUserId) return;
        fetch(BACKEND_URL + '/api/messages/' + currentUserId)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                var container = document.getElementById('contactsList');
                var empty = document.getElementById('emptyMessages');
                if (!data.success || !data.data || data.data.length === 0) {
                    container.innerHTML = '';
                    empty.style.display = 'block';
                    return;
                }
                empty.style.display = 'none';
                container.innerHTML = data.data.map(function(msg) {
                    return '<div style="padding:8px 16px; background:rgba(255,255,255,0.8); border-radius:20px; margin:4px; display:inline-block;">' + (msg.senderName || 'Utilisateur') + '</div>';
                }).join('');
            })
            .catch(function(e) { console.error(e); });
    }

    // ============================================================
    // SHOP
    // ============================================================
    function loadShopArticles() {
        if (!currentUserId) return;
        fetch(BACKEND_URL + '/api/articles/seller/' + currentUserId)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                var container = document.getElementById('shopArticles');
                if (!data.success || !data.data || data.data.length === 0) {
                    container.innerHTML = '<p class="empty">Aucun article publié</p>';
                    return;
                }
                container.innerHTML = '';
                data.data.forEach(function(a) {
                    var div = document.createElement('div');
                    div.style.cssText = 'display:flex; align-items:center; gap:12px; background:rgba(255,255,255,0.5); border-radius:12px; padding:12px; margin-bottom:8px;';
                    div.innerHTML = '<img src="' + (a.image || 'https://via.placeholder.com/50x50/F5F0E8/CCCCCC?text=BLK') + '" style="width:50px; height:50px; object-fit:cover; border-radius:8px;" /><div style="flex:1;"><strong>' + a.title + '</strong><br>' + a.price + ' FCFA</div>';
                    if (a.status === 'active') {
                        var delBtn = document.createElement('button');
                        delBtn.className = 'btn btn-danger btn-sm';
                        delBtn.style.width = 'auto';
                        delBtn.style.padding = '6px 12px';
                        delBtn.textContent = 'Supprimer';
                        delBtn.onclick = function() { deleteArticle(a.id); };
                        div.appendChild(delBtn);
                    }
                    container.appendChild(div);
                });
            })
            .catch(function(e) { console.error(e); });
    }

    function deleteArticle(articleId) {
        if (!confirm('Supprimer cet article ?')) return;
        fetch(BACKEND_URL + '/api/articles/' + articleId, { method: 'DELETE' })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success) {
                    showAlert('✅ Article supprimé !', 'success');
                    loadShopArticles();
                    loadProducts();
                } else {
                    showAlert('❌ Erreur', 'error');
                }
            })
            .catch(function(e) { showAlert('❌ Erreur: ' + e.message, 'error'); });
    }

    // ============================================================
    // PUBLIER UN ARTICLE
    // ============================================================
    document.getElementById('btnPublish').addEventListener('click', function() {
        var html = '<h3>📤 Publier un article</h3>';
        html += '<input type="text" id="pubTitle" placeholder="Titre" style="width:100%; padding:12px; margin-bottom:8px; border:1px solid #ddd; border-radius:10px;">';
        html += '<textarea id="pubDesc" placeholder="Description" rows="3" style="width:100%; padding:12px; margin-bottom:8px; border:1px solid #ddd; border-radius:10px;"></textarea>';
        html += '<input type="number" id="pubPrice" placeholder="Prix (FCFA)" style="width:100%; padding:12px; margin-bottom:8px; border:1px solid #ddd; border-radius:10px;">';
        html += '<select id="pubCategory" style="width:100%; padding:12px; margin-bottom:8px; border:1px solid #ddd; border-radius:10px;">';
        html += '<option value="vêtements">Vêtements</option><option value="chaussures">Chaussures</option><option value="sacs">Sacs</option><option value="bijoux">Bijoux</option><option value="accessoires">Accessoires</option>';
        html += '</select>';
        html += '<input type="file" id="pubImage" accept="image/*" style="width:100%; padding:8px; margin-bottom:8px;">';
        html += '<button class="btn btn-primary" id="pubSubmit">Publier</button>';
        html += '<button class="btn btn-outline" onclick="this.parentElement.parentElement.remove()" style="margin-top:8px;">Annuler</button>';

        var overlay = openModal(html);

        document.getElementById('pubSubmit').addEventListener('click', function() {
            var title = document.getElementById('pubTitle').value.trim();
            var description = document.getElementById('pubDesc').value.trim();
            var price = document.getElementById('pubPrice').value;
            var category = document.getElementById('pubCategory').value;
            var imageFile = document.getElementById('pubImage').files[0];

            if (!title || !description || !price) {
                showAlert('Remplis tous les champs', 'error');
                return;
            }

            function submitArticleWithImage(imageUrl) {
                fetch(BACKEND_URL + '/api/articles', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: title,
                        description: description,
                        price: parseInt(price),
                        category: category,
                        image: imageUrl || '',
                        sellerId: currentUserId,
                        sellerName: currentUser.name
                    })
                })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.success) {
                        showAlert('✅ Article publié !', 'success');
                        overlay.remove();
                        loadShopArticles();
                        loadProducts();
                    } else {
                        showAlert('❌ ' + data.message, 'error');
                    }
                })
                .catch(function(e) {
                    showAlert('❌ Erreur: ' + e.message, 'error');
                });
            }

            if (imageFile) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    var base64 = e.target.result;
                    fetch(BACKEND_URL + '/api/upload', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ base64: base64 })
                    })
                    .then(function(res) { return res.json(); })
                    .then(function(data) {
                        if (data.success) {
                            submitArticleWithImage(data.url);
                        } else {
                            showAlert('Erreur upload image', 'error');
                        }
                    })
                    .catch(function(e) {
                        showAlert('Erreur upload: ' + e.message, 'error');
                    });
                };
                reader.readAsDataURL(imageFile);
            } else {
                submitArticleWithImage('');
            }
        });
    });

    // ============================================================
    // LOGOUT
    // ============================================================
    document.getElementById('btnLogout').addEventListener('click', function() {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
    });

    console.log('✅ BLK Marketplace - Version minimale');
    console.log('🔗 Backend URL:', BACKEND_URL);
</script>
</body>
</html>
